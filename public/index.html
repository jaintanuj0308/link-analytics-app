<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Analytics Shortener</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            <span>Linkify</span>
        </div>
        <nav>
            <a href="#" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Dashboard
            </a>
            <a href="#" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Analytics
            </a>
            <a href="#" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                Customize
            </a>
        </nav>
    </div>

    <main class="content">
        <header class="top-header fade-in">
            <div class="header-text">
                <h1>Overview</h1>
                <p>Welcome back! Here's your link performance.</p>
            </div>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin&background=4F46E5&color=fff" alt="User">
            </div>
        </header>

        <section class="shortener-box card slide-up">
            <h2>Create New Link</h2>
            <form id="shortenForm">
                <div class="input-group">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF"
                        stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <input type="url" id="originalUrl"
                        placeholder="Paste your long URL here... e.g., https://example.com/very-long-url" required>
                </div>
                <div class="input-group small">
                    <input type="number" id="maxClicks" min="1" placeholder="Max clicks (optional)">
                </div>
                <button type="submit" id="shortenBtn" class="btn-primary">Shorten Link</button>
            </form>
            <div id="errorMsg" class="error-msg"></div>

            <div id="resultBox" class="result-box hidden">
                <span class="success-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg></span>
                <div class="result-content">
                    <p>Success! Your short link is ready.</p>
                    <div class="short-link-container">
                        <a id="shortUrlDisplay" href="#" target="_blank"></a>
                    </div>
                </div>
                <button id="copyBtn" class="btn-secondary" aria-label="Copy short URL">Copy Link</button>
            </div>
        </section>

        <section class="dashboard-section card slide-up delay-1">
            <div class="section-header">
                <h2>Recent Links</h2>
                <div class="stats-badge">
                    <span id="totalLinksCount">0</span> Links Total
                </div>
            </div>
            <div class="table-container">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short URL</th>
                            <th>Clicks</th>
                            <th>Limit</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Last Accessed</th>
                            <th>Popularity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
